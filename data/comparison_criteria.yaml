      expected_evidence:
        - "clear fit by traveler profile"
        - "clear mismatch by traveler profile"
        - "profile sensitivity of the format"
        - "decision tolerance required from the user"
    copy:
      name:
        en: "Traveler Type Fit"
        ar: "الملاءمة حسب نوع المسافر"
        fr: "Adéquation par profil de voyageur"
        es: "Adecuación por tipo de viajero"
        de: "Eignung nach Reisetyp"
        zh: "按旅行者类型的适配度"
        ja: "旅行者タイプ別適合性"
      short_name:
        en: "Traveler Fit"
        ar: "ملاءمة المسافر"
        fr: "Adéquation voyageur"
        es: "Ajuste del viajero"
        de: "Reisepassung"
        zh: "旅客适配"
        ja: "旅行者適合"
      question:
        en: "For which traveler profile is this format most appropriate, and how strong is that fit?"
        ar: "لأي نمط من المسافرين يناسب هذا الشكل أكثر، وما مدى قوة هذه الملاءمة؟"
        fr: "Pour quel profil de voyageur ce format est-il le plus approprié, et avec quelle force ?"
        es: "¿Para qué perfil de viajero es más adecuado este formato y qué tan fuerte es ese ajuste?"
        de: "Für welches Reisendenprofil ist dieses Format am passendsten, und wie stark ist diese Passung?"
        zh: "这种形式最适合哪类旅行者，这种适配有多强？"
        ja: "この形式はどの旅行者プロファイルに最も適しており、その適合性はどれほど強いか。"
      description:
        en: "Measures whether the format serves a clearly defined traveler profile rather than pretending to suit everyone equally."
        ar: "يقيس ما إذا كان هذا الشكل يخدم نمطًا واضحًا من المسافرين بدل الادعاء بأنه يناسب الجميع بالتساوي."
        fr: "Mesure si le format sert un profil de voyageur clairement défini au lieu de prétendre convenir également à tous."
        es: "Mide si el formato sirve a un perfil de viajero claramente definido en lugar de fingir que se adapta igual a todos."
        de: "Misst, ob das Format einem klar definierten Reisendenprofil dient, statt vorzugeben, für alle gleichermaßen zu passen."
        zh: "衡量这种形式是否真正服务于明确的旅行者类型，而不是假装同样适合所有人。"
        ja: "誰にでも同じように合うと装うのではなく、明確な旅行者タイプに実際に適しているかを測る。"
      low_meaning:
        en: "Weak or ambiguous fit by traveler profile."
        ar: "ملاءمة ضعيفة أو ملتبسة حسب نمط المسافر."
        fr: "Adéquation faible ou ambiguë selon le profil."
        es: "Ajuste débil o ambiguo según el perfil."
        de: "Schwache oder mehrdeutige Passung nach Reisendenprofil."
        zh: "按旅行者类型看，适配较弱或含糊。"
        ja: "旅行者タイプに対する適合が弱い、または曖昧。"
      high_meaning:
        en: "Strong fit for clearly defined traveler types."
        ar: "ملاءمة قوية لأنماط مسافر محددة بوضوح."
        fr: "Forte adéquation pour des profils de voyageurs clairement définis."
        es: "Ajuste fuerte para perfiles de viajero claramente definidos."
        de: "Starke Passung für klar definierte Reisendentypen."
        zh: "对明确旅行者类型具有很强适配。"
        ja: "明確な旅行者タイプに対して強い適合性を持つ。"

