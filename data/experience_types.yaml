schema_version: "1.0.0"
dataset: "experience_types"
status: "active"
owner: "TourVsTravel"
last_reviewed: "2026-04-08"

meta:
  purpose: "Canonical ontology for the 17 travel structures used across TourVsTravel reference pages, comparisons, and decision tools."
  operating_principle: "Define travel forms as decision structures with stable operational meaning, not as loose marketing categories."
  source_of_truth: true
  publication_posture: "reference-grade"
  notes:
    - "Baseline scores are structural priors, not absolute universal verdicts."
    - "All comparison outputs must still be explained contextually at destination or traveler-profile level."
    - "This file defines what each travel type is, what it is not, and how it tends to behave under the canonical comparison criteria."

defaults:
  enabled: true
  route_family: "experience_type"
  slug_policy:
    format: "ascii-kebab-case"
    localized_slugs_required: false
    reserved_substrings_forbidden:
      - "--vs--"
  supported_languages:
    - "en"
    - "ar"
    - "fr"
    - "es"
    - "de"
    - "zh"
    - "ja"
  profile_affinity_scale:
    allowed_values:
      - "low"
      - "medium"
      - "high"
  structural_axes:
    structure_intensity:
      allowed_values:
        - "low"
        - "medium"
        - "high"
    autonomy_level:
      allowed_values:
        - "low"
        - "medium"
        - "high"
    support_level:
      allowed_values:
        - "low"
        - "medium"
        - "high"
    pace_profile:
      allowed_values:
        - "fixed"
        - "balanced"
        - "flexible"
    immersion_profile:
      allowed_values:
        - "surface"
        - "balanced"
        - "deep"
    predictability_profile:
      allowed_values:
        - "low"
        - "medium"
        - "high"
  required_fields:
    - "id"
    - "order"
    - "enabled"
    - "slug"
    - "label"
    - "summary"
    - "family"
    - "structural_axes"
    - "baseline_scores"
    - "profile_affinity"
    - "strengths"
    - "weaknesses"
    - "best_for"
    - "poor_fit_for"
    - "tradeoff_signature"

families:
  - id: "structured_supported"
    label:
      en: "Structured & Supported"
      ar: "منظم ومدعوم"
      fr: "Structuré et accompagné"
      es: "Estructurado y asistido"
      de: "Strukturiert und begleitet"
      zh: "结构化与支持型"
      ja: "構造化・支援型"

  - id: "independent_autonomous"
    label:
      en: "Independent & Autonomous"
      ar: "مستقل وذاتي"
      fr: "Indépendant et autonome"
      es: "Independiente y autónomo"
      de: "Unabhängig und autonom"
      zh: "独立自主型"
      ja: "独立・自律型"

  - id: "comfort_premium"
    label:
      en: "Comfort & Premium"
      ar: "راحة وتميّز"
      fr: "Confort et premium"
      es: "Confort y premium"
      de: "Komfort und Premium"
      zh: "舒适与高端型"
      ja: "快適・プレミアム型"

  - id: "purpose_led"
    label:
      en: "Purpose-Led"
      ar: "مدفوع بالغاية"
      fr: "Orienté par une finalité"
      es: "Orientado por propósito"
      de: "Zweckorientiert"
      zh: "目的导向型"
      ja: "目的主導型"

  - id: "mobility_led"
    label:
      en: "Mobility-Led"
      ar: "مدفوع بالتنقل"
      fr: "Orienté mobilité"
      es: "Orientado a la movilidad"
      de: "Mobilitätsorientiert"
      zh: "移动方式导向型"
      ja: "移動主導型"

  - id: "values_led"
    label:
      en: "Values-Led"
      ar: "مدفوع بالقيم"
      fr: "Guidé par les valeurs"
      es: "Guiado por valores"
      de: "Wertegeleitet"
      zh: "价值导向型"
      ja: "価値主導型"

experience_types:
  - id: "guided_group_tour"
    order: 1
    enabled: true
    slug: "guided-group-tour"
    family: "structured_supported"
    label:
      en: "Guided Group Tour"
      ar: "جولة جماعية موجهة"
      fr: "Circuit en groupe guidé"
      es: "Tour guiado en grupo"
      de: "Geführte Gruppenreise"
      zh: "导游团体游"
      ja: "ガイド付き団体旅行"
    short_label:
      en: "Guided Tour"
      ar: "جولة موجهة"
      fr: "Circuit guidé"
      es: "Tour guiado"
      de: "Geführte Reise"
      zh: "导游游"
      ja: "ガイド旅行"
    summary:
      en: "A pre-structured travel format in which itinerary, coordination, and major logistics are handled by an operator or guide-led program."
      ar: "صيغة سفر منظمة مسبقًا تُدار فيها الرحلة والتنسيق واللوجستيات الأساسية عبر منظم أو برنامج يقوده مرشد."
      fr: "Format de voyage pré-structuré dans lequel l'itinéraire, la coordination et la logistique principale sont pris en charge par un opérateur ou un programme guidé."
      es: "Formato de viaje preestructurado en el que el itinerario, la coordinación y la logística principal son gestionados por un operador o un programa con guía."
      de: "Vorstrukturierte Reiseform, bei der Route, Koordination und zentrale Logistik von einem Veranstalter oder geführten Programm übernommen werden."
      zh: "一种预先结构化的旅行形式，由运营方或导游项目负责行程、协调与主要后勤。"
      ja: "行程、調整、主要な手配をオペレーターまたはガイド付きプログラムが担う、あらかじめ構造化された旅行形式。"
    formal_definition: "Travel is delivered as an organized package or program with externally managed sequencing, coordination, and risk buffering."
    inclusion_scope:
      - "Escorted multi-stop tours"
      - "Coach tours"
      - "Operator-managed small group tours"
      - "Guide-led destination circuits"
    exclusion_scope:
      - "Private bespoke travel planning without group structure"
      - "Fully independent travel"
      - "Cruise products unless the cruise itself is the primary structure"
    adjacent_types:
      - "luxury_travel"
      - "family_travel"
      - "cruise_experience"
    structural_axes:
      structure_intensity: "high"
      autonomy_level: "low"
      support_level: "high"
      pace_profile: "fixed"
      immersion_profile: "balanced"
      predictability_profile: "high"
    baseline_scores:
      constraint_fit: 4
      operational_complexity: 5
      control_vs_support: 3
      depth_of_experience: 3
      predictability: 5
      traveler_type_fit: 4
    profile_affinity:
      independent_planner: "low"
      family_coordinator: "high"
      first_time_traveler: "high"
      cost_sensitive_explorer: "medium"
      comfort_priority_traveler: "high"
      logistics_averse_traveler: "high"
    strengths:
      - "Reduces planning and coordination burden."
      - "Contains variance better than highly fragmented formats."
      - "Useful for first-time or logistics-averse travelers."
    weaknesses:
      - "Reduces freedom and spontaneous route control."
      - "Can compress places into managed exposure rather than lived depth."
      - "Group pacing may mismatch individual travel rhythm."
    best_for:
      - "Travelers who value support, sequence clarity, and lower friction."
      - "Users entering a destination with low prior familiarity."
    poor_fit_for:
      - "Travelers seeking high autonomy or highly self-shaped immersion."
      - "Users who strongly resist externally fixed pacing."
    tradeoff_signature: "Buys predictability and support at the cost of flexibility and traveler-controlled depth."
    seo:
      title_template:
        en: "Guided Group Tour | Travel Structure Profile"
        ar: "جولة جماعية موجهة | ملف بنية السفر"
        fr: "Circuit en groupe guidé | Profil de structure de voyage"
        es: "Tour guiado en grupo | Perfil de estructura de viaje"
        de: "Geführte Gruppenreise | Profil der Reiseform"
        zh: "导游团体游 | 旅行结构画像"
        ja: "ガイド付き団体旅行 | 旅行構造プロフィール"

  - id: "independent_travel"
    order: 2
    enabled: true
    slug: "independent-travel"
    family: "independent_autonomous"
    label:
      en: "Independent Travel"
      ar: "السفر المستقل"
      fr: "Voyage indépendant"
      es: "Viaje independiente"
      de: "Unabhängiges Reisen"
      zh: "独立旅行"
      ja: "独立旅行"
    short_label:
      en: "Independent"
      ar: "مستقل"
      fr: "Indépendant"
      es: "Independiente"
      de: "Unabhängig"
      zh: "独立型"
      ja: "独立型"
    summary:
      en: "A self-directed travel structure in which the traveler controls planning, booking, sequencing, and day-to-day decisions without a governing tour framework."
      ar: "صيغة سفر ذاتية التوجيه يتحكم فيها المسافر بالتخطيط والحجز وتسلسل الرحلة والقرارات اليومية دون إطار جولة حاكم."
      fr: "Structure de voyage auto-dirigée dans laquelle le voyageur contrôle la planification, la réservation, le séquençage et les décisions quotidiennes sans cadre de circuit gouvernant."
      es: "Estructura de viaje autodirigida en la que el viajero controla planificación, reservas, secuencia y decisiones diarias sin un marco de tour dominante."
      de: "Selbstgesteuerte Reiseform, bei der der Reisende Planung, Buchung, Ablauf und tägliche Entscheidungen ohne übergeordneten Tourrahmen selbst kontrolliert."
      zh: "一种由旅行者自行控制规划、预订、节奏与日常决策的旅行结构，不受团体框架支配。"
      ja: "旅行者自身が計画、予約、順序、日々の判断を管理し、ツアー枠組みに支配されない自己主導型の旅行構造。"
    formal_definition: "Travel is organized by the traveler directly, with primary responsibility for logistics, sequencing, and adaptation remaining with the traveler."
    inclusion_scope:
      - "Self-booked multi-city trips"
      - "Independent destination stays"
      - "Self-shaped itineraries without operator control"
    exclusion_scope:
      - "Escorted or operator-led group tours"
      - "Cruise-first travel structures"
      - "Strict retreat or pilgrimage formats with externally imposed structure"
    adjacent_types:
      - "solo_travel"
      - "road_trip_self_drive"
      - "backpacking"
    structural_axes:
      structure_intensity: "low"
      autonomy_level: "high"
      support_level: "low"
      pace_profile: "flexible"
      immersion_profile: "deep"
      predictability_profile: "low"
    baseline_scores:
      constraint_fit: 3
      operational_complexity: 2
      control_vs_support: 4
      depth_of_experience: 4
      predictability: 2
      traveler_type_fit: 3
    profile_affinity:
      independent_planner: "high"
      family_coordinator: "medium"
      first_time_traveler: "low"
      cost_sensitive_explorer: "high"
      comfort_priority_traveler: "medium"
      logistics_averse_traveler: "low"
    strengths:
      - "Maximizes autonomy and route control."
      - "Can produce stronger fit to personal priorities."
      - "Allows high flexibility and local texture."
    weaknesses:
      - "Places planning and recovery burden on the traveler."
      - "Higher variance and disruption sensitivity."
      - "Quality depends heavily on traveler capability."
    best_for:
      - "Users with planning confidence and tolerance for uncertainty."
      - "Travelers optimizing around self-defined value."
    poor_fit_for:
      - "Users who need structure, support, or lower decision burden."
      - "Travelers with low tolerance for fragmented logistics."
    tradeoff_signature: "Buys autonomy and adaptability at the cost of simplicity, support, and variance control."
    seo:
      title_template:
        en: "Independent Travel | Travel Structure Profile"
        ar: "السفر المستقل | ملف بنية السفر"
        fr: "Voyage indépendant | Profil de structure de voyage"
        es: "Viaje independiente | Perfil de estructura de viaje"
        de: "Unabhängiges Reisen | Profil der Reiseform"
        zh: "独立旅行 | 旅行结构画像"
        ja: "独立旅行 | 旅行構造プロフィール"

  - id: "solo_travel"
    order: 3
    enabled: true
    slug: "solo-travel"
    family: "independent_autonomous"
    label:
      en: "Solo Travel"
      ar: "السفر الفردي"
      fr: "Voyage en solo"
      es: "Viaje en solitario"
      de: "Alleinreisen"
      zh: "独自旅行"
      ja: "一人旅"
    short_label:
      en: "Solo"
      ar: "فردي"
      fr: "Solo"
      es: "Solo"
      de: "Solo"
      zh: "独行"
      ja: "ソロ"
    summary:
      en: "Travel undertaken primarily alone, where the traveler carries both autonomy and decision burden without in-group coordination support."
      ar: "سفر يُنجز أساسًا بشكل فردي، حيث يتحمل المسافر الاستقلالية وعبء القرار دون دعم تنسيقي من مجموعة."
      fr: "Voyage entrepris principalement seul, où le voyageur assume à la fois l'autonomie et la charge décisionnelle sans soutien de coordination de groupe."
      es: "Viaje realizado principalmente en solitario, donde el viajero asume tanto la autonomía como la carga de decisión sin apoyo coordinativo de grupo."
      de: "Reiseform, die überwiegend allein unternommen wird und bei der der Reisende sowohl Autonomie als auch Entscheidungsbelastung ohne Gruppensupport trägt."
      zh: "主要由个人单独完成的旅行形式，旅行者同时承担自主权与决策负担，缺少群体协调支持。"
      ja: "主に一人で行う旅行形式で、旅行者が自律性と意思決定負荷の両方をグループ支援なしで担う。"
    formal_definition: "Solo travel is defined primarily by party structure rather than by support model, but operationally it often amplifies autonomy, self-reliance, and sensitivity to friction."
    inclusion_scope:
      - "Independent solo trips"
      - "Solo city breaks"
      - "Long-form solo itineraries"
    exclusion_scope:
      - "Group tours where the traveler merely joins alone"
      - "Family travel"
      - "Shared-party travel with a primary companion structure"
    adjacent_types:
      - "independent_travel"
      - "backpacking"
      - "transformational_wellness"
    structural_axes:
      structure_intensity: "low"
      autonomy_level: "high"
      support_level: "low"
      pace_profile: "flexible"
      immersion_profile: "deep"
      predictability_profile: "medium"
    baseline_scores:
      constraint_fit: 3
      operational_complexity: 3
      control_vs_support: 4
      depth_of_experience: 4
      predictability: 3
      traveler_type_fit: 3
    profile_affinity:
      independent_planner: "high"
      family_coordinator: "low"
      first_time_traveler: "low"
      cost_sensitive_explorer: "medium"
      comfort_priority_traveler: "medium"
      logistics_averse_traveler: "low"
    strengths:
      - "High autonomy and self-shaped pacing."
      - "Can intensify personal reflection and immersion."
      - "Avoids group coordination drag."
    weaknesses:
      - "No built-in distribution of decision burden."
      - "Risk management and friction sit with one person."
      - "Can amplify loneliness or fatigue for some users."
    best_for:
      - "Self-reliant travelers comfortable with independent judgment."
      - "Users valuing autonomy over shared coordination."
    poor_fit_for:
      - "Travelers needing shared logistics support."
      - "Users uncomfortable carrying all decisions alone."
    tradeoff_signature: "Buys maximum personal autonomy and reflective depth, but concentrates all coordination and recovery burden in one traveler."
    seo:
      title_template:
        en: "Solo Travel | Travel Structure Profile"
        ar: "السفر الفردي | ملف بنية السفر"
        fr: "Voyage en solo | Profil de structure de voyage"
        es: "Viaje en solitario | Perfil de estructura de viaje"
        de: "Alleinreisen | Profil der Reiseform"
        zh: "独自旅行 | 旅行结构画像"
        ja: "一人旅 | 旅行構造プロフィール"

  - id: "backpacking"
    order: 4
    enabled: true
    slug: "backpacking"
    family: "independent_autonomous"
    label:
      en: "Backpacking"
      ar: "الرحلات بحقيبة الظهر"
      fr: "Backpacking"
      es: "Backpacking"
      de: "Backpacking"
      zh: "背包旅行"
      ja: "バックパッキング"
    short_label:
      en: "Backpacking"
      ar: "حقيبة الظهر"
      fr: "Backpacking"
      es: "Backpacking"
      de: "Backpacking"
      zh: "背包"
      ja: "バックパック"
    summary:
      en: "A mobility-light, budget-sensitive, autonomy-heavy travel format that prioritizes flexibility, route adaptability, and value density over comfort and support."
      ar: "صيغة سفر خفيفة الحركة وحساسة للميزانية وعالية الاستقلالية، تفضل المرونة وقابلية تعديل المسار وكثافة القيمة على الراحة والدعم."
      fr: "Format de voyage léger, sensible au budget et fortement autonome, qui privilégie la flexibilité, l'adaptabilité de l'itinéraire et la densité de valeur sur le confort et l'accompagnement."
      es: "Formato de viaje ligero, sensible al presupuesto y con alta autonomía, que prioriza flexibilidad, adaptabilidad de ruta y densidad de valor sobre confort y apoyo."
      de: "Leichte, budgetsensible und stark autonome Reiseform, die Flexibilität, Routenanpassung und Wertdichte über Komfort und Unterstützung stellt."
      zh: "一种轻装、预算敏感且自主性高的旅行形式，更强调灵活性、路线可调性与价值密度，而非舒适与支持。"
      ja: "軽装・予算重視・高自律の旅行形式で、快適性や支援よりも柔軟性、ルート適応、価値密度を優先する。"
    formal_definition: "Backpacking is a flexible, low-structure travel mode oriented around budget efficiency, mobility, and route adaptability."
    inclusion_scope:
      - "Low-cost multi-stop travel"
      - "Hostel-based or mobility-light routes"
      - "Flexible open-ended itineraries"
    exclusion_scope:
      - "Luxury mobility formats"
      - "Structured escorted tours"
      - "Retreat-first or comfort-first formats"
    adjacent_types:
      - "solo_travel"
      - "independent_travel"
      - "adventure_travel"
    structural_axes:
      structure_intensity: "low"
      autonomy_level: "high"
      support_level: "low"
      pace_profile: "flexible"
      immersion_profile: "deep"
      predictability_profile: "low"
    baseline_scores:
      constraint_fit: 3
      operational_complexity: 2
      control_vs_support: 4
      depth_of_experience: 4
      predictability: 2
      traveler_type_fit: 3
    profile_affinity:
      independent_planner: "high"
      family_coordinator: "low"
      first_time_traveler: "low"
      cost_sensitive_explorer: "high"
      comfort_priority_traveler: "low"
      logistics_averse_traveler: "low"
    strengths:
      - "High flexibility and route adaptability."
      - "Strong value density for budget-sensitive travelers."
      - "Can unlock longer duration travel under limited cost ceilings."
    weaknesses:
      - "Lower comfort and higher operational friction."
      - "Weak fit for travelers needing predictability or support."
      - "Quality depends heavily on personal tolerance for uncertainty."
    best_for:
      - "Budget-sensitive explorers with high autonomy tolerance."
      - "Travelers willing to trade comfort for duration or freedom."
    poor_fit_for:
      - "Comfort-first travelers."
      - "Users needing lower variance and low coordination burden."
    tradeoff_signature: "Buys duration, flexibility, and value density at the cost of comfort, predictability, and operational simplicity."
    seo:
      title_template:
        en: "Backpacking | Travel Structure Profile"
        ar: "الرحلات بحقيبة الظهر | ملف بنية السفر"
        fr: "Backpacking | Profil de structure de voyage"
        es: "Backpacking | Perfil de estructura de viaje"
        de: "Backpacking | Profil der Reiseform"
        zh: "背包旅行 | 旅行结构画像"
        ja: "バックパッキング | 旅行構造プロフィール"

  - id: "luxury_travel"
    order: 5
    enabled: true
    slug: "luxury-travel"
    family: "comfort_premium"
    label:
      en: "Luxury Travel"
      ar: "السفر الفاخر"
      fr: "Voyage de luxe"
      es: "Viaje de lujo"
      de: "Luxusreisen"
      zh: "奢华旅行"
      ja: "ラグジュアリー旅行"
    short_label:
      en: "Luxury"
      ar: "فاخر"
      fr: "Luxe"
      es: "Lujo"
      de: "Luxus"
      zh: "奢华"
      ja: "ラグジュアリー"
    summary:
      en: "A premium travel format optimized around comfort, service quality, friction reduction, and curated high-standard delivery."
      ar: "صيغة سفر متميزة تُحسَّن حول الراحة وجودة الخدمة وتقليل الاحتكاك وتقديم مُنسق عالي المستوى."
      fr: "Format de voyage premium optimisé autour du confort, de la qualité de service, de la réduction de friction et d'une exécution haut de gamme."
      es: "Formato de viaje premium optimizado en torno al confort, la calidad del servicio, la reducción de fricción y una ejecución curada de alto nivel."
      de: "Premium-Reiseform, optimiert auf Komfort, Servicequalität, geringe Friktion und kuratierte hochwertige Umsetzung."
      zh: "一种围绕舒适、服务质量、降低摩擦与高标准交付而优化的高端旅行形式。"
      ja: "快適性、サービス品質、摩擦の低減、高水準のキュレーションされた提供を重視するプレミアム旅行形式。"
    formal_definition: "Luxury travel is defined less by price alone than by deliberate friction reduction, service density, reliability, and elevated comfort."
    inclusion_scope:
      - "High-service hotels and premium routing"
      - "Private guiding and concierge-heavy planning"
      - "Comfort-first premium itineraries"
    exclusion_scope:
      - "Budget-focused independent travel"
      - "Adventure-first hardship formats"
      - "Low-service backpacking structures"
    adjacent_types:
      - "guided_group_tour"
      - "cruise_experience"
      - "transformational_wellness"
    structural_axes:
      structure_intensity: "medium"
      autonomy_level: "medium"
      support_level: "high"
      pace_profile: "balanced"
      immersion_profile: "balanced"
      predictability_profile: "high"
    baseline_scores:
      constraint_fit: 4
      operational_complexity: 4
      control_vs_support: 4
      depth_of_experience: 4
      predictability: 4
      traveler_type_fit: 4
    profile_affinity:
      independent_planner: "medium"
      family_coordinator: "medium"
      first_time_traveler: "high"
      cost_sensitive_explorer: "low"
      comfort_priority_traveler: "high"
      logistics_averse_traveler: "high"
    strengths:
      - "High comfort and low-friction execution."
      - "Better support and reliability than low-service formats."
      - "Can absorb complexity through purchased service layers."
    weaknesses:
      - "Higher cost floor."
      - "May reduce raw spontaneity or value density."
      - "Can become consumption-heavy rather than experience-deep if poorly designed."
    best_for:
      - "Comfort-priority travelers."
      - "Users who want service quality and reduced coordination strain."
    poor_fit_for:
      - "Strict budget-constrained travelers."
      - "Users who define value mainly through low-cost autonomy."
    tradeoff_signature: "Buys comfort, service, and lower friction at the cost of cost efficiency and sometimes experiential rawness."
