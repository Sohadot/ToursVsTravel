  home:
    eyebrow:
      en: "17 travel styles • 200 destinations • evidence-led comparison"
      ar: "17 نمط سفر • 200 وجهة • مقارنة قائمة على الأدلة"
      fr: "17 styles de voyage • 200 destinations • comparaison fondée sur des critères explicites"
      es: "17 estilos de viaje • 200 destinos • comparación basada en evidencia"
      de: "17 Reisestile • 200 Ziele • evidenzgeleiteter Vergleich"
      zh: "17种旅行风格 • 200个目的地 • 基于证据的比较"
      ja: "17の旅行スタイル • 200の目的地 • エビデンス主導の比較"

    heading:
      en: "Same Destination. Different Stories."
      ar: "الوجهة نفسها. والقصص مختلفة."
      fr: "Même destination. Histoires différentes."
      es: "Mismo destino. Historias diferentes."
      de: "Dasselbe Ziel. Unterschiedliche Geschichten."
      zh: "同一目的地，不同故事。"
      ja: "同じ目的地。異なる物語。"

    intro:
      en: "TourVsTravel helps you compare how people move through the world across 17 distinct travel styles. We do not sell one answer. We help you choose the path that fits your intent, your budget, and your way of experiencing place."
      ar: "يساعدك TourVsTravel على مقارنة كيف يتحرك الناس عبر العالم من خلال 17 نمطًا مختلفًا من أنماط السفر. نحن لا نبيع إجابة واحدة، بل نساعدك على اختيار المسار الذي يناسب نيتك وميزانيتك وطريقتك في عيش المكان."
      fr: "TourVsTravel vous aide à comparer la manière dont les personnes traversent le monde à travers 17 styles distincts. Nous ne vendons pas une réponse unique. Nous vous aidons à choisir le chemin adapté à votre intention, votre budget et votre façon de vivre un lieu."
      es: "TourVsTravel te ayuda a comparar cómo las personas recorren el mundo a través de 17 estilos distintos. No vendemos una única respuesta. Te ayudamos a elegir el camino que se ajusta a tu intención, tu presupuesto y tu forma de vivir un lugar."
      de: "TourVsTravel hilft Ihnen zu vergleichen, wie Menschen sich durch die Welt bewegen – über 17 unterschiedliche Reisestile hinweg. Wir verkaufen keine einzige Antwort. Wir helfen Ihnen, den Weg zu wählen, der zu Ihrer Absicht, Ihrem Budget und Ihrer Art passt, einen Ort zu erleben."
      zh: "TourVsTravel 帮助你比较人们如何以17种不同的旅行风格穿行世界。我们不售卖单一答案，而是帮助你选择最适合你的意图、预算和体验方式的路径。"
      ja: "TourVsTravelは、17の異なる旅行スタイルを通して、人がどのように世界を旅するかを比較できるようにします。私たちは一つの答えを売るのではなく、あなたの意図、予算、場所の体験の仕方に合った道を選べるよう支援します。"

    compare_engine_heading:
      en: "Compare Two Ways Through the World"
      ar: "قارن بين طريقتين لعبور العالم"
      fr: "Comparer deux manières de traverser le monde"
      es: "Compara dos formas de recorrer el mundo"
      de: "Zwei Arten vergleichen, die Welt zu durchqueren"
      zh: "比较两种穿行世界的方式"
      ja: "世界を旅する二つの方法を比較する"

    compare_engine_intro:
      en: "TourVsTravel is built as a comparison infrastructure. Every travel style carries a different promise, cost structure, social rhythm, and relationship to place."
      ar: "بُني TourVsTravel كبنية مقارنة مرجعية. كل نمط سفر يحمل وعدًا مختلفًا، وبنية تكلفة مختلفة، وإيقاعًا اجتماعيًا مختلفًا، وعلاقة مختلفة بالمكان."
      fr: "TourVsTravel est construit comme une infrastructure de comparaison. Chaque style de voyage porte une promesse, une structure de coût, un rythme social et une relation au lieu différents."
      es: "TourVsTravel está construido como una infraestructura de comparación. Cada estilo de viaje implica una promesa, una estructura de costes, un ritmo social y una relación con el lugar diferentes."
      de: "TourVsTravel ist als Vergleichsinfrastruktur aufgebaut. Jeder Reisestil hat ein anderes Versprechen, eine andere Kostenstruktur, einen anderen sozialen Rhythmus und eine andere Beziehung zum Ort."
      zh: "TourVsTravel 被构建为一套比较基础设施。每种旅行风格都意味着不同的承诺、成本结构、社会节奏以及与地方的关系。"
      ja: "TourVsTravelは比較インフラとして構築されています。各旅行スタイルには、それぞれ異なる約束、費用構造、社会的リズム、場所との関係があります。"

    styles_heading:
      en: "The 17 Faces of Travel"
      ar: "الوجوه السبعة عشر للسفر"
      fr: "Les 17 visages du voyage"
      es: "Las 17 caras del viaje"
      de: "Die 17 Gesichter des Reisens"
      zh: "旅行的17种面貌"
      ja: "旅の17の顔"

    styles_intro:
      en: "Each style is treated as a real conceptual path, not a decorative label. These are not categories for content filling. They are the logic of the site itself."
      ar: "يُعامل كل نمط باعتباره مسارًا مفاهيميًا حقيقيًا، لا تسمية زخرفية. هذه ليست فئات لملء المحتوى، بل هي منطق الموقع نفسه."
      fr: "Chaque style est traité comme un véritable chemin conceptuel, non comme une simple étiquette décorative. Ce ne sont pas des catégories de remplissage, mais la logique même du site."
      es: "Cada estilo se trata como un camino conceptual real, no como una etiqueta decorativa. No son categorías para rellenar contenido, sino la lógica misma del sitio."
      de: "Jeder Stil wird als echter konzeptueller Weg behandelt, nicht als dekoratives Etikett. Dies sind keine Kategorien zum Füllen von Inhalten, sondern die eigentliche Logik der Website."
      zh: "每种风格都被视为真实的概念路径，而不是装饰性标签。它们不是填充内容的分类，而是网站本身的逻辑。"
      ja: "各スタイルは装飾的なラベルではなく、実際の概念的な道として扱われます。これは単なる分類ではなく、サイトそのものの論理です。"

    tools_heading:
      en: "Tools That Bring People Back"
      ar: "أدوات تعيد الناس مرارًا"
      fr: "Des outils qui font revenir les gens"
      es: "Herramientas que hacen volver a la gente"
      de: "Werkzeuge, die Menschen zurückbringen"
      zh: "让用户反复回来的工具"
      ja: "人が何度も戻ってくるツール"

    tools_intro:
      en: "The site is not only a publishing engine. It is also a repeat-use decision layer designed to turn comparison into a practical experience."
      ar: "الموقع ليس مجرد محرك نشر، بل هو أيضًا طبقة قرار متكررة الاستخدام، صُممت لتحويل المقارنة إلى تجربة عملية."
      fr: "Le site n'est pas seulement un moteur de publication. C'est aussi une couche décisionnelle réutilisable conçue pour transformer la comparaison en expérience pratique."
      es: "El sitio no es solo un motor de publicación. También es una capa de decisión reutilizable diseñada para convertir la comparación en una experiencia práctica."
      de: "Die Website ist nicht nur eine Publikationsmaschine. Sie ist auch eine wiederverwendbare Entscheidungsebene, die Vergleich in eine praktische Erfahrung verwandelt."
      zh: "这个网站不仅是一个发布引擎，它还是一个可重复使用的决策层，旨在把比较变成实际体验。"
      ja: "このサイトは単なる公開エンジンではありません。比較を実用的な体験へ変える、再利用可能な判断レイヤーでもあります。"

    methodology_heading:
      en: "Methodology is the Frame. Travel is the Road."
      ar: "المنهجية هي الإطار. والسفر هو الطريق."
      fr: "La méthodologie est le cadre. Le voyage est la route."
      es: "La metodología es el marco. El viaje es el camino."
      de: "Die Methodik ist der Rahmen. Die Reise ist der Weg."
      zh: "方法论是框架，旅行是道路。"
      ja: "方法論はフレームであり、旅は道です。"

    methodology_intro:
      en: "TourVsTravel is built as a reference system. Our role is not to push one ideology of movement, but to compare travel paths transparently, using structured criteria, official sources, and explicit assumptions."
      ar: "بُني TourVsTravel كنظام مرجعي. دورنا ليس دفع أيديولوجيا واحدة للحركة، بل مقارنة مسارات السفر بشفافية عبر معايير منظمة ومصادر رسمية وافتراضات معلنة."
      fr: "TourVsTravel est construit comme un système de référence. Notre rôle n'est pas d'imposer une idéologie du déplacement, mais de comparer les chemins du voyage avec transparence à l'aide de critères structurés, de sources officielles et d'hypothèses explicites."
      es: "TourVsTravel está construido como un sistema de referencia. Nuestro papel no es imponer una ideología del movimiento, sino comparar trayectorias de viaje con transparencia mediante criterios estructurados, fuentes oficiales y supuestos explícitos."
      de: "TourVsTravel ist als Referenzsystem aufgebaut. Unsere Aufgabe ist es nicht, eine Ideologie des Reisens durchzusetzen, sondern Reisepfade transparent mithilfe strukturierter Kriterien, offizieller Quellen und expliziter Annahmen zu vergleichen."
      zh: "TourVsTravel 被构建为一个参考系统。我们的职责不是推动单一的旅行意识形态，而是借助结构化标准、官方来源和明确假设，透明地比较不同的旅行路径。"
      ja: "TourVsTravelはリファレンスシステムとして構築されています。私たちの役割は一つの移動思想を押しつけることではなく、構造化された基準、公的ソース、明示的な前提を用いて旅の道筋を透明に比較することです。"

