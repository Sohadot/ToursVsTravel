  theme_color: "#002B49"

  hreflang:
    include_x_default: true
    x_default_lang: "en"

  title_templates:
    home:
      en: "TourVsTravel.com | Compare Your Way Through the World"
      ar: "TourVsTravel.com | قارن طريقتك في السفر عبر العالم"
      fr: "TourVsTravel.com | Comparez votre manière de parcourir le monde"
      es: "TourVsTravel.com | Compara tu forma de recorrer el mundo"
      de: "TourVsTravel.com | Vergleichen Sie Ihre Art, die Welt zu bereisen"
      zh: "TourVsTravel.com | 比较你穿行世界的方式"
      ja: "TourVsTravel.com | 世界を旅する方法を比較する"

    comparison:
      en: "{exp_a} vs {exp_b} in {destination} | TourVsTravel"
      ar: "{exp_a} ضد {exp_b} في {destination} | TourVsTravel"
      fr: "{exp_a} vs {exp_b} à {destination} | TourVsTravel"
      es: "{exp_a} vs {exp_b} en {destination} | TourVsTravel"
      de: "{exp_a} vs {exp_b} in {destination} | TourVsTravel"
      zh: "{destination}：{exp_a} 与 {exp_b} 对比 | TourVsTravel"
      ja: "{destination}での{exp_a} vs {exp_b} | TourVsTravel"

  description_templates:
    home:
      en: "Compare 17 travel styles across destinations, intentions, budgets, and experiences. TourVsTravel is the unbiased reference for travel decisions."
      ar: "قارن بين 17 نمطًا من أنماط السفر عبر الوجهات والنيات والميزانيات والتجارب. TourVsTravel هو المرجع المحايد لقرارات السفر."
      fr: "Comparez 17 styles de voyage selon les destinations, les intentions, les budgets et les expériences. TourVsTravel est la référence impartiale pour décider comment voyager."
      es: "Compara 17 estilos de viaje según destinos, intenciones, presupuestos y experiencias. TourVsTravel es la referencia imparcial para decidir cómo viajar."
      de: "Vergleichen Sie 17 Reisestile über Ziele, Absichten, Budgets und Erlebnisse hinweg. TourVsTravel ist die unparteiische Referenz für Reiseentscheidungen."
      zh: "比较17种旅行方式，覆盖目的地、意图、预算与体验。TourVsTravel 是旅行决策的客观参考。"
      ja: "目的地、意図、予算、体験を横断して17の旅行スタイルを比較。TourVsTravelは旅行判断のための中立的リファレンスです。"

    comparison:
      en: "Compare {exp_a} vs {exp_b} in {destination}. Evidence-led travel analysis across cost, structure, immersion, and fit."
      ar: "قارن بين {exp_a} و{exp_b} في {destination}. تحليل سفر مبني على الأدلة عبر التكلفة والبنية والانغماس ومدى الملاءمة."
      fr: "Comparez {exp_a} et {exp_b} à {destination}. Une analyse fondée sur des critères explicites: coût, structure, immersion et adéquation."
      es: "Compara {exp_a} y {exp_b} en {destination}. Un análisis basado en evidencia sobre coste, estructura, inmersión y adecuación."
      de: "Vergleichen Sie {exp_a} und {exp_b} in {destination}. Evidenzgeleitete Analyse zu Kosten, Struktur, Immersion und Eignung."
      zh: "比较 {destination} 中的 {exp_a} 与 {exp_b}。基于证据分析成本、结构、沉浸度与适配性。"
      ja: "{destination}での{exp_a}と{exp_b}を比較。コスト、構造、没入度、適合性をエビデンスベースで分析します。"

