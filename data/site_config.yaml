site:
  name: "TourVsTravel"
  domain: "https://tourvstravel.com"
  base_url: "https://tourvstravel.com"

  tagline:
    en: "The Unbiased Reference for Travel Decisions"
    ar: "المرجع المحايد لقرارات السفر"
    fr: "La référence impartiale pour les décisions de voyage"
    es: "La referencia imparcial para las decisiones de viaje"
    de: "Die unparteiische Referenz für Reiseentscheidungen"
    zh: "旅行决策的客观参考"
    ja: "旅行判断のための中立的リファレンス"

  summary:
    en: "A multilingual, evidence-led travel decision infrastructure built to compare how people move through the world across destinations, styles, and intentions."
    ar: "بنية مرجعية متعددة اللغات قائمة على الأدلة، صُممت لمقارنة كيف يتحرك الناس عبر العالم بين الوجهات وأنماط السفر والنوايا المختلفة."
    fr: "Une infrastructure multilingue et fondée sur les preuves, conçue pour comparer la manière dont les personnes traversent le monde selon les destinations, les styles et les intentions."
    es: "Una infraestructura multilingüe y basada en evidencia, diseñada para comparar cómo las personas se mueven por el mundo entre destinos, estilos e intenciones."
    de: "Eine mehrsprachige, evidenzgeleitete Infrastruktur, die vergleicht, wie Menschen sich durch die Welt bewegen – über Reiseziele, Stile und Absichten hinweg."
    zh: "一个多语言、基于证据的旅行决策基础设施，用于比较人们如何以不同目的、风格和目的地穿行世界。"
    ja: "目的地、スタイル、意図を横断して、人がどのように世界を旅するかを比較するために設計された、多言語・エビデンス主導の旅行判断インフラです。"

