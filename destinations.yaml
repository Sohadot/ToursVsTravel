### translation_pipeline.py

```python
import anthropic
import yaml
import json

client = anthropic.Anthropic()

LANGUAGES = {
    "fr": "French",
    "es": "Spanish", 
    "de": "German",
    "zh": "Simplified Chinese",
    "ja": "Japanese",
    "ar": "Arabic"
}

def translate_text(text: str, target_language: str) -> str:
    """Translate travel content with cultural context"""
    
    response = client.messages.create(
        model="claude-opus-4-5",
        max_tokens=1000,
        messages=[{
            "role": "user",
            "content": f"""Translate this travel content to {target_language}.
            
Rules:
- Use natural, culturally appropriate language
- Maintain travel/tourism terminology accuracy
- Keep numbers, URLs, and proper nouns unchanged
- For Arabic: use Modern Standard Arabic (MSA)
- Return ONLY the translated text, nothing else

Text to translate:
{text}"""
        }]
    )
    return response.content[0].text.strip()

def translate_yaml_field(value, languages=LANGUAGES):
    """Takes English text, returns dict with all translations"""
    if not isinstance(value, str):
        return value
    
    translations = {"en": value}
    for lang_code, lang_name in languages.items():
        print(f"  Translating to {lang_name}...")
        translations[lang_code] = translate_text(value, lang_name)
    
    return translations

def process_comparisons(input_file: str, output_file: str):
    """Process comparisons.yaml and add translations"""
    
    with open(input_file, 'r', encoding='utf-8') as f:
        data = yaml.safe_load(f)
    
    for comparison in data['comparisons']:
        print(f"\nProcessing: {comparison['destination_id']}")
        
        # Translate local_insight
        if 'local_insight' in comparison['data']:
            insight = comparison['data']['local_insight']
            if isinstance(insight, str):
                print("Translating local_insight...")
                comparison['data']['local_insight'] = \
                    translate_yaml_field(insight)
        
        # Translate affiliate link labels
        for link in comparison['data'].get('affiliate_links', []):
            if isinstance(link.get('label'), str):
                print(f"Translating affiliate label: {link['label']}")
                link['label'] = translate_yaml_field(link['label'])
    
    with open(output_file, 'w', encoding='utf-8') as f:
        yaml.dump(data, f, allow_unicode=True, 
                 default_flow_style=False)
    
    print(f"\nDone. Saved to {output_file}")

if __name__ == "__main__":
    process_comparisons(
        "data/comparisons.yaml",
        "data/comparisons_translated.yaml"
    )
```

