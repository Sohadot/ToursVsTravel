{% set page_lang = lang|default(current_lang|default(language|default('en'))) %}

<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-brand" href="/{{ page_lang }}/" aria-label="TourVsTravel home">
      <img
        class="site-brand__icon"
        src="/static/img/brand/logo-icon.webp"
        alt=""
        width="44"
        height="44"
        decoding="async"
      >
      <span class="site-brand__wordmark">
        <span class="site-brand__tour">Tour</span><span class="site-brand__vs">VS</span><span class="site-brand__travel">Travel</span><span class="site-brand__dot">.com</span>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/{{ page_lang }}/" class="site-nav__link">Home</a>
      <a href="/{{ page_lang }}/styles/" class="site-nav__link">Styles</a>
      <a href="/{{ page_lang }}/compare/" class="site-nav__link">Compare</a>
      <a href="/{{ page_lang }}/methodology/" class="site-nav__link">Methodology</a>
      <a href="/{{ page_lang }}/destinations/" class="site-nav__link">Destinations</a>
      <a href="/{{ page_lang }}/tools/" class="site-nav__link">Tools</a>
      <a href="/{{ page_lang }}/#report" class="site-nav__link">Report</a>
    </nav>

    <div class="site-header__right">
      <nav class="language-switcher" aria-label="Language selection">
        <a class="language-switcher__item{% if page_lang == 'en' %} is-active{% endif %}" href="/en/">EN</a>
        <a class="language-switcher__item{% if page_lang == 'ar' %} is-active{% endif %}" href="/ar/">AR</a>
        <a class="language-switcher__item{% if page_lang == 'fr' %} is-active{% endif %}" href="/fr/">FR</a>
        <a class="language-switcher__item{% if page_lang == 'es' %} is-active{% endif %}" href="/es/">ES</a>
        <a class="language-switcher__item{% if page_lang == 'de' %} is-active{% endif %}" href="/de/">DE</a>
        <a class="language-switcher__item{% if page_lang == 'zh' %} is-active{% endif %}" href="/zh/">ZH-CN</a>
        <a class="language-switcher__item{% if page_lang == 'ja' %} is-active{% endif %}" href="/ja/">JA</a>
      </nav>

      <a class="site-header__cta" href="/{{ page_lang }}/#comparison-entry">
        Find Your Match
      </a>

      <details class="mobile-menu">
        <summary class="mobile-menu__button" aria-label="Open navigation menu">
          Menu
        </summary>

        <div class="mobile-menu__panel">
          <a href="/{{ page_lang }}/">Home</a>
          <a href="/{{ page_lang }}/styles/">Styles</a>
          <a href="/{{ page_lang }}/compare/">Compare</a>
          <a href="/{{ page_lang }}/methodology/">Methodology</a>
          <a href="/{{ page_lang }}/destinations/">Destinations</a>
          <a href="/{{ page_lang }}/tools/">Tools</a>
          <a href="/{{ page_lang }}/#report">Report</a>
          <a class="mobile-menu__cta" href="/{{ page_lang }}/#comparison-entry">Find Your Match</a>

          <div class="mobile-menu__langs" aria-label="Language selection">
            <a href="/en/">EN</a>
            <a href="/ar/">AR</a>
            <a href="/fr/">FR</a>
            <a href="/es/">ES</a>
            <a href="/de/">DE</a>
            <a href="/zh/">ZH-CN</a>
            <a href="/ja/">JA</a>
          </div>
        </div>
      </details>
    </div>
  </div>
</header>
